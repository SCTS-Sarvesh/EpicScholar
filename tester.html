<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NVIDIA API Local Test</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>NVIDIA API Chat</h1>

    <textarea id="prompt" placeholder="Type your prompt here"></textarea>

    <br>

    <button onclick="generate()">Generate</button>

    <div id="output"></div>

    <script>
        async function generate() {

            const prompt = document.getElementById("prompt").value;

            document.getElementById("output").innerText = "Generating...";

            try {

                const response = await fetch(
                    "https://integrate.api.nvidia.com/v1/chat/completions",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json",

                            // PASTE YOUR NVIDIA API KEY HERE
                            "Authorization": "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"
                        },

                        body: JSON.stringify({
                            model: "meta/llama3-70b-instruct",

                            messages: [
                                {
                                    role: "user",
                                    content: prompt
                                }
                            ],

                            temperature: 0.7,
                            max_tokens: 200
                        })
                    }
                );

                const data = await response.json();

                console.log(data);

                document.getElementById("output").innerText =
                    data.choices?.[0]?.message?.content ||
                    JSON.stringify(data, null, 2);

            } catch (err) {

                console.error(err);

                document.getElementById("output").innerText =
                    "Error: " + err.message;
            }
        }
    </script>

</body>

</html>
