<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicScholar - Ultra-Realistic iOS Showcase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #040406;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Sora', sans-serif;
        }

        /* ── AMBIENT BACKDROP ORBS (Themed Gradients) ── */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(150px);
            opacity: 0.35;
            z-index: 1;
        }

        /* ── INTERACTIVE PHONE CANVAS ── */
        .canvas-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            perspective: 1500px;
            z-index: 2;
        }

        /* ── ULTRA-REALISTIC IPHONE HARDWARE CHASSIS ── */
        .iphone-device {
            position: relative;
            width: 390px;
            height: 800px;
            background: #1c1c1e;
            border-radius: 56px;
            padding: 9px;
            /* Premium layered shadow casting for spatial realism */
            box-shadow: 
                0px 40px 90px -20px rgba(0, 0, 0, 0.95),
                0px 0px 0px 3.5px #3a3a3c,
                0px 0px 0px 6px #2c2c2e,
                inset 0px 0px 2px 3px rgba(255, 255, 255, 0.1),
                inset 0px 0px 0px 6px #0b0b0c;
            animation: hardwareFloat 7.5s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        /* Physical Speaker Micro Mesh */
        .earpiece-mesh {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: #0a0a0a;
            border-radius: 10px;
            z-index: 200;
            box-shadow: inset 0 0.5px 1px rgba(255,255,255,0.08);
        }

        /* High-Definition Screen Panel */
        .oled-screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 47px;
            overflow: hidden;
            background: radial-gradient(circle at 50% 20%, #171124 0%, #030306 80%);
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px 20px;
            user-select: none;
        }

        /* Realistic Glass Glare Layer */
        .screen-glass-glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(125deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.005) 30%, transparent 60%);
            pointer-events: none;
            z-index: 150;
        }

        /* ── STATUS BAR METRICS ── */
        .ios-status-bar {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            z-index: 90;
        }

        .status-time {
            margin-left: 14px;
            letter-spacing: -0.02em;
            animation: statusBarOpacityControl 11s ease-in-out infinite;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6.5px;
            margin-right: 14px;
            animation: statusBarOpacityControl 11s ease-in-out infinite;
        }

        .ios-battery {
            width: 25px;
            height: 12.5px;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 4px;
            padding: 1px;
            position: relative;
        }
        .ios-battery::after {
            content: '';
            position: absolute;
            right: -3.5px;
            top: 3px;
            width: 1.5px;
            height: 4.5px;
            background: rgba(255,255,255,0.8);
            border-radius: 0 1px 1px 0;
        }
        .battery-level-fill {
            width: 90%;
            height: 100%;
            background: #ffffff;
            border-radius: 1.5px;
        }

        /* ── HIGH FIDELITY LIQUID DYNAMIC ISLAND SYSTEM ── */
        .dynamic-island-anchor {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .dynamic-island-fluid {
            width: 110px;
            height: 31px;
            background: #000000;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 14px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.7),
                inset 0 0 0 0.5px rgba(255,255,255,0.07);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            /* Fluid bounce animation simulating Apple's premium interface physics */
            animation: islandBubbleMorph 11s cubic-bezier(0.19, 1, 0.22, 1) infinite;
            will-change: width, height, border-radius, top, padding;
        }

        /* Notification Layout Transition Layer */
        .island-notification-layer {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            width: 100%;
            opacity: 0;
            transform: scale(0.7) translateY(-5px);
            filter: blur(4px);
            animation: notificationContentPop 11s cubic-bezier(0.19, 1, 0.22, 1) infinite;
            will-change: opacity, transform, filter;
        }

        /* WhatsApp Authentic Visual Structure */
        .whatsapp-avatar-container {
            position: relative;
            width: 44px;
            height: 44px;
            min-width: 44px;
            background: linear-gradient(135deg, #128c7e, #075e54);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(7, 94, 84, 0.25);
            margin-top: 1px;
        }

        /* Mini Sub-badge Icon */
        .whatsapp-mini-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: #25D366;
            border-radius: 50%;
            border: 1.5px solid #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-text-stack {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 100%;
            overflow: hidden;
        }

        .notification-meta-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .group-name-label {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .time-badge {
            font-size: 11.5px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        /* Taller, multi-line message wrapper ensuring full text is completely visible */
        .message-payload-content {
            font-size: 13px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            letter-spacing: -0.01em;
            white-space: normal; /* Permits precise word-wrapping */
            word-wrap: break-word;
        }

        .sender-title-tag {
            font-weight: 700;
            color: #25D366; /* Authentic green tinted identity tag */
            margin-right: 4px;
        }

        /* ── AUTHENTIC iOS SPRINGBOARD GRID ── */
        .springboard-workspace {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            margin-top: 24px;
        }

        .ios-app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 26px 18px;
            padding: 20px 4px 0 4px;
        }

        .app-shortcut-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6.5px;
            text-decoration: none;
        }

        /* Squircle Mask Base */
        .app-icon-squircle {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            box-shadow: 
                0 8px 18px rgba(0,0,0,0.4),
                inset 0 0 0 0.5px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* True iOS-Themed App Icons (Gradients and Glyphs) */
        .app-icon-squircle.epicscholar-core {
            background: linear-gradient(135deg, #ff416c, #0072ff);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .app-icon-squircle.ios-messages { background: linear-gradient(135deg, #34c759, #24b049); }
        .app-icon-squircle.ios-photos { 
            background: #ffffff;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 4px;
        }
        .photo-petal { border-radius: 50%; opacity: 0.85; }
        .app-icon-squircle.ios-safari { background: radial-gradient(circle, #0072ff 0%, #00c6ff 100%); }
        .app-icon-squircle.ios-notes { background: linear-gradient(180deg, #f9f9f9 22%, #ffe699 22%); }
        .app-icon-squircle.ios-files { background: linear-gradient(135deg, #54a3ff, #0076ff); }

        .app-label-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 400;
            text-align: center;
            letter-spacing: -0.01em;
        }

        /* ── AUTHENTIC iOS DOCK SYSTEM ── */
        .ios-dock-station {
            background: rgba(255, 255, 255, 0.11);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 30px;
            padding: 13px;
            margin-bottom: 2px;
            box-shadow: 
                inset 0 0 0 1px rgba(255,255,255,0.08),
                0 12px 36px rgba(0,0,0,0.45);
        }

        .ios-dock-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .ios-home-indicator {
            width: 134px;
            height: 4.5px;
            background: #ffffff;
            border-radius: 10px;
            margin: 11px auto 0 auto;
            opacity: 0.9;
        }

        /* ── MOTION GRAPHICS ENGINE MATRIX ── */
        
        /* Realistic Floating Simulation */
        @keyframes hardwareFloat {
            0%, 100% { transform: translateY(0) rotateX(1deg) rotateY(-0.5deg); }
            50% { transform: translateY(-10px) rotateX(-0.5deg) rotateY(0.5deg); }
        }

        /* Dynamic Island Bubble Animation Curve Blueprint:
           - 0s to 2s (0% - 18.1%): Pure Native Small Pill Form
           - 2s (18.1%): Triggers fluid bubble expansion with overshoot height to fully contain layout lines
           - 2.5s to 8.5s (22.7% - 77.2%): Settles into enhanced visibility layout state
           - 8.5s to 9.2s (77.2% - 83.6%): Clean retraction snap
        */
        @keyframes islandBubbleMorph {
            0%, 18.1% {
                width: 110px;
                height: 31px;
                border-radius: 35px;
                top: 13px;
                padding: 0 14px;
                background: #000000;
            }
            21.8% { /* Instant Fluid Bubble Pop Overshoot */
                width: 354px;
                height: 108px;
                border-radius: 27px;
                top: 10px;
                background: #000000;
            }
            23.6%, 77.2% { /* Settled Form Factor (Increased Height to 98px for seamless readability) */
                width: 346px;
                height: 98px;
                border-radius: 29px;
                top: 10px;
                padding: 13px 15px;
                background: #000000;
            }
            82.7%, 100% { /* Organic fluid retraction snap down */
                width: 110px;
                height: 31px;
                border-radius: 35px;
                top: 13px;
                padding: 0 14px;
                background: #000000;
            }
        }

        /* Content layer entry alignment matching bubble physics */
        @keyframes notificationContentPop {
            0%, 19.5% {
                opacity: 0;
                transform: scale(0.65) translateY(-12px);
                filter: blur(5px);
            }
            23.6% { /* Elastic spring absorption */
                opacity: 1;
                transform: scale(1.03) translateY(0);
                filter: blur(0);
            }
            25.4%, 75.5% { /* Stationary presentation hold */
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
            80.5%, 100% {
                opacity: 0;
                transform: scale(0.6) translateY(-10px);
                filter: blur(4px);
            }
        }

        /* Dimming state for top bar status symbols during Island activity */
        @keyframes statusBarOpacityControl {
            0%, 18.1%, 82.7%, 100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
            23.6%, 77.2% {
                opacity: 0.1;
                transform: scale(0.96);
                filter: blur(1px);
            }
        }

        /* ── RESPONSIVE ENGINE VIEWPORT ADAPTATION ── */
        @media (max-width: 480px), (max-height: 850px) {
            .iphone-device {
                transform: scale(0.78) rotateX(0) rotateY(0) !important;
                animation: mobileDeviceFloat 6s ease-in-out infinite !important;
            }
        }

        @keyframes mobileDeviceFloat {
            0%, 100% { transform: scale(0.78) translateY(0); }
            50% { transform: scale(0.78) translateY(-8px); }
        }
    </style>
</head>
