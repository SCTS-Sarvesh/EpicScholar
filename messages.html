<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicScholar | Messages</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body class="messages-page">

    <!-- LIQUID GLASS BACKGROUND -->
    <div id="liquid-glass-container">
        <div class="glass-blob blob-1"></div>
        <div class="glass-blob blob-2"></div>
        <div class="glass-blob blob-3"></div>
    </div>

    <!-- HEADER -->
    <div class="header glass-element fixed-top-layer">
        <h1>EpicScholar</h1>
    </div>

    <!-- Mobile Header (shown on ≤1023px) -->
    <div class="mobile-header">
        <h2 class="mobile-header-title">Messages</h2>
    </div>

    <!-- SIDEBAR NAV -->
    <div class="sidebar glass-element fixed-top-layer">
        <div class="nav-wrap">
            <a class="nav-item" href="dashboard.html" data-icon="🏠"><span>🏠</span><span>Home</span></a>
            <a class="nav-item nav-item-active" href="messages.html"
                data-icon="✉️"><span>✉️</span><span>Messages</span></a>
            <a class="nav-item" href="self-study.html" data-icon="📖"><span>📖</span><span>Self-Study</span></a>
            <a class="nav-item" href="edubot.html" data-icon="🤖"><span>🤖</span><span>EduBot</span></a>
            <a class="nav-item" href="mini-games.html" data-icon="🎮"><span>🎮</span><span>Mini-Games</span></a>
        </div>
        <div class="settings-wrap">
            <a class="nav-item" href="profile.html" data-icon="👤"><span>👤</span><span>Profile</span></a>
        </div>
    </div>

    <!-- MAIN MESSAGES LAYOUT -->
    <div id="messages-wrapper">

        <!-- LEFT PANEL: Inbox List -->
        <div id="msg-left-panel" class="glass-element">
            <div id="msg-left-header">
                <div id="msg-left-title">
                    <span class="msg-icon">✉️</span>
                    <span>Inbox</span>
                    <span id="unread-badge" class="badge" style="display:none;">0</span>
                </div>
                <button id="compose-btn" title="Compose New Message">
                    <span>✏️</span>
                    <span>Compose</span>
                </button>
            </div>

            <div id="msg-tabs">
                <button class="msg-tab active" data-tab="inbox">Inbox</button>
                <button class="msg-tab" data-tab="sent">Sent</button>
                <button class="msg-tab" data-tab="starred">Starred</button>
            </div>

            <div id="msg-search-wrap">
                <input type="search" id="msg-search" placeholder="Search messages..." />
            </div>

            <div id="msg-list-container">
                <div id="msg-list">
                    <!-- Messages injected by JS -->
                    <div class="msg-list-loading">
                        <div class="spinner"></div>
                        <span>Loading messages...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Message Detail / Compose -->
        <div id="msg-right-panel" class="glass-element">

            <!-- EMPTY STATE (default) -->
            <div id="msg-empty-state">
                <div class="empty-icon">📬</div>
                <h2>Select a message</h2>
                <p>Choose a conversation from the inbox, or compose a new message.</p>
                <button class="btn-primary" id="compose-btn-empty">✏️ Compose New Message</button>
            </div>

            <!-- MESSAGE THREAD VIEW -->
            <div id="msg-thread-view">

                <div id="msg-thread-header">
                    <div id="msg-thread-meta">
                        <div id="msg-thread-avatar"></div>
                        <div id="msg-thread-info">
                            <div id="msg-thread-name"></div>
                            <div id="msg-thread-subtitle"></div>
                        </div>
                    </div>
                    <div id="msg-thread-actions">
                        <button class="thread-action-btn mobile-back-btn" id="btn-back-to-list" style="display:none;">
                            ← Back
                        </button>
                        <button class="thread-action-btn" id="btn-star-thread" title="Star conversation">☆</button>
                        <button class="thread-action-btn" id="btn-delete-thread"
                            title="Delete conversation">🗑️</button>
                        <button class="thread-action-btn" id="btn-reply-top" title="Reply">↩️ Reply</button>
                    </div>
                </div>

                <div id="msg-thread-messages">
                    <!-- Thread messages rendered here -->
                </div>

                <!-- Reply Area -->
                <div id="msg-reply-area">
                    <div id="reply-toolbar">
                        <button class="toolbar-btn" data-action="bold" title="Bold">𝐁</button>
                        <button class="toolbar-btn" data-action="italic" title="Italic">𝑰</button>
                        <button class="toolbar-btn" data-action="underline" title="Underline">U̲</button>
                        <div class="toolbar-divider"></div>
                        <button class="toolbar-btn" data-action="insertUnorderedList" title="Bullet list">≡</button>
                        <button class="toolbar-btn" data-action="insertOrderedList" title="Numbered list">①</button>
                        <div class="toolbar-divider"></div>
                        <label class="toolbar-btn attach-label" title="Attach note file">
                            📎
                            <input type="file" id="attach-file-input" accept=".pdf,.txt,.md,.docx,image/*" multiple
                                style="display:none;">
                        </label>
                        <button class="toolbar-btn" id="voice-record-btn" title="Voice note">🎙️</button>
                        <button class="toolbar-btn" id="insert-study-link-btn"
                            title="Share a study resource">📚</button>
                    </div>
                    <div id="reply-body" contenteditable="true" placeholder="Write your reply..."></div>
                    <div id="attachments-preview"></div>
                    <div id="voice-recording-bar" style="display:none;">
                        <div id="voice-recording-indicator">
                            <span class="rec-dot"></span>
                            <span id="rec-timer">0:00</span>
                            <span>Recording...</span>
                        </div>
                        <button id="voice-stop-btn">⏹ Stop & Attach</button>
                        <button id="voice-cancel-btn">✕ Cancel</button>
                    </div>
                    <div id="reply-footer">
                        <div id="reply-footer-left">
                            <span id="reply-char-count">0 chars</span>
                        </div>
                        <div id="reply-footer-right">
                            <button id="reply-discard-btn" class="btn-secondary">Discard</button>
                            <button id="reply-send-btn" class="btn-primary">Send Reply ➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COMPOSE VIEW -->
            <div id="msg-compose-view">
                <div id="compose-header">
                    <h3>✏️ New Message</h3>
                    <button class="thread-action-btn mobile-back-btn" id="btn-back-compose" style="display:none;">
                        ← Back
                    </button>
                    <button id="compose-close-btn" title="Close">✕</button>
                </div>

                <div id="compose-fields">
                    <div class="compose-field-row">
                        <label>To:</label>
                        <div id="compose-to-wrap">
                            <input type="text" id="compose-to-input" placeholder="Search for a student..."
                                autocomplete="off" />
                            <div id="compose-to-dropdown" style="display:none;"></div>
                        </div>
                    </div>
                    <div class="compose-field-row">
                        <label>Subject:</label>
                        <input type="text" id="compose-subject" placeholder="Message subject..." />
                    </div>
                    <div class="compose-field-row" id="compose-tag-row">
                        <label>Tag:</label>
                        <div id="compose-tags">
                            <button class="tag-btn active" data-tag="general">💬 General</button>
                            <button class="tag-btn" data-tag="study">📚 Study Help</button>
                            <button class="tag-btn" data-tag="notes">📝 Notes Share</button>
                            <button class="tag-btn" data-tag="question">❓ Question</button>
                            <button class="tag-btn" data-tag="collaboration">🤝 Collaboration</button>
                        </div>
                    </div>
                </div>

                <div id="compose-toolbar">
                    <button class="toolbar-btn" data-action="bold">𝐁</button>
                    <button class="toolbar-btn" data-action="italic">𝑰</button>
                    <button class="toolbar-btn" data-action="underline">U̲</button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" data-action="insertUnorderedList">≡</button>
                    <button class="toolbar-btn" data-action="insertOrderedList">①</button>
                    <div class="toolbar-divider"></div>
                    <label class="toolbar-btn attach-label" title="Attach file">
                        📎
                        <input type="file" id="compose-attach-input" accept=".pdf,.txt,.md,.docx,image/*" multiple
                            style="display:none;">
                    </label>
                    <button class="toolbar-btn" id="compose-voice-btn" title="Voice note">🎙️</button>
                    <button class="toolbar-btn" id="compose-study-link-btn" title="Share study resource">📚</button>
                </div>

                <div id="compose-body" contenteditable="true" placeholder="Write your message..."></div>
                <div id="compose-attachments-preview"></div>

                <div id="compose-voice-bar" style="display:none;">
                    <div id="compose-voice-indicator">
                        <span class="rec-dot"></span>
                        <span id="compose-rec-timer">0:00</span>
                        <span>Recording voice note...</span>
                    </div>
                    <button id="compose-voice-stop">⏹ Stop & Attach</button>
                    <button id="compose-voice-cancel">✕ Cancel</button>
                </div>

                <div id="compose-footer">
                    <button id="compose-send-btn" class="btn-primary">Send Message ➤</button>
                    <button id="compose-discard-btn" class="btn-secondary">Discard</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Study Resource Picker Modal -->
    <div id="study-link-modal" class="modal" style="display:none;">
        <div class="modal-content study-link-modal-content">
            <h3>📚 Share Study Resource</h3>
            <div class="study-link-types">
                <button class="study-type-btn active" data-type="link">🔗 Web Link</button>
                <button class="study-type-btn" data-type="note">📝 Quick Note</button>
                <button class="study-type-btn" data-type="quiz">❓ Quiz Question</button>
            </div>
            <div id="study-link-form">
                <input type="url" id="study-link-url" placeholder="Paste URL (YouTube, article, etc.)..." />
                <input type="text" id="study-link-title" placeholder="Title or description..." />
                <select id="study-link-subject">
                    <option value="">Select subject (optional)</option>
                    <option value="math">📐 Mathematics</option>
                    <option value="science">🔬 Science</option>
                    <option value="english">📖 English</option>
                    <option value="history">🏛️ History</option>
                    <option value="cs">💻 Computer Science</option>
                    <option value="other">📚 Other</option>
                </select>
            </div>
            <div id="study-note-form" style="display:none;">
                <textarea id="study-note-content" placeholder="Write a quick study note to share..."></textarea>
            </div>
            <div id="study-quiz-form" style="display:none;">
                <input type="text" id="quiz-question" placeholder="Question..." />
                <input type="text" id="quiz-answer" placeholder="Answer (optional)..." />
                <input type="text" id="quiz-subject" placeholder="Subject..." />
            </div>
            <div class="modal-actions">
                <button class="btn-primary" id="study-link-insert-btn">Insert</button>
                <button class="btn-secondary" id="study-link-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Mobile / Tablet Bottom Nav -->
    <div class="mobile-bottom-bar" id="mobileBottomBar">
        <a href="dashboard.html" class="mobile-nav-icon" data-page="dashboard.html">
            <i class="fas fa-home"></i>
        </a>
        <a href="messages.html" class="mobile-nav-icon active" data-page="messages.html">
            <i class="fas fa-envelope"></i>
        </a>
        <a href="self-study.html" class="mobile-nav-icon" data-page="self-study.html">
            <i class="fas fa-book-open"></i>
        </a>
        <a href="edubot.html" class="mobile-nav-icon" data-page="edubot.html">
            <i class="fas fa-robot"></i>
        </a>
        <a href="mini-games.html" class="mobile-nav-icon" data-page="mini-games.html">
            <i class="fas fa-gamepad"></i>
        </a>
        <a href="profile.html" class="mobile-nav-icon" data-page="profile.html">
            <i class="fas fa-user"></i>
        </a>
    </div>

    <!-- Feedback Toast -->
    <div id="feedback-message"></div>

    <script src="messages.js"></script>
</body>

</html>
