<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EpicScholar - FAQ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;600;900&display=swap');

        :root {
            /* Exact brand colors from testing-1.html */
            --theme-pink: #ff416c;
            --theme-blue: #0072ff;
            --spring-snap: cubic-bezier(0.24, 1.35, 0.4, 1.05);
            
            /* Enhanced dark glass definition for maximum contrast */
            --glass-bg: rgba(10, 10, 14, 0.82);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Prevent default browser canvas exposure & eliminate white edges on mobile */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            color: #ffffff;
        }

        /* ── FIXED ORB CONTAINER (Prevents mobile edge artifacts) ── */
        .orb-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            background: #000000;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(90px);
            opacity: 0;
            animation: orbIn 3s ease 0.5s forwards;
        }

        @keyframes orbIn {
            to { opacity: 1; }
        }

        /* Desktop Orb Layout mirroring testing-1.html proportions */
        @media (min-width: 769px) {
            .orb-pink {
                width: 50vw; height: 50vw;
                background: radial-gradient(circle, rgba(255,65,108,.20) 0%, transparent 70%);
                top: -10%; right: -5%;
            }
            .orb-blue {
                width: 44vw; height: 44vw;
                background: radial-gradient(circle, rgba(0,114,255,.16) 0%, transparent 70%);
                bottom: -10%; left: -5%;
                animation-delay: 0.8s;
            }
        }

        /* Mobile Lush Gradients scaled and constrained inside container boundary */
        @media (max-width: 768px) {
            .orb-pink {
                width: 110vw; height: 110vw;
                background: radial-gradient(circle, rgba(255,65,108,.25) 0%, transparent 65%);
                top: -20%; right: -25%;
            }
            .orb-blue {
                width: 100vw; height: 100vw;
                background: radial-gradient(circle, rgba(0,114,255,.20) 0%, transparent 65%);
                bottom: -15%; left: -25%;
                animation-delay: 0.6s;
            }
        }

        /* ── LAYOUT WRAPPER ── */
        .wrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 620px;
            padding: 0 20px;
        }

        /* ── SOLID LIQUID GLASS BOXES ── */
        .glass-box {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(220%);
            -webkit-backdrop-filter: blur(40px) saturate(220%);
            border: 1px solid var(--glass-border);
            
            box-shadow: 
                inset 1px 1px 3px rgba(255, 255, 255, 0.08),
                inset -1px -2px 6px rgba(0, 0, 0, 0.95),
                0 30px 60px rgba(0, 0, 0, 0.85);

            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;

            opacity: 0;
            filter: blur(20px);
            transform: translateY(40px) scale(0.95);
            animation: cinematicPop 1.2s var(--spring-snap) forwards;
        }

        @keyframes cinematicPop {
            0% { opacity: 0; filter: blur(20px); transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); }
        }

        /* Exact responsive gap formatting rules for desktop vs mobile */
        @media (min-width: 769px) {
            .wrap { gap: 24px; }
            .glass-box { padding: 40px; border-radius: 24px; }
        }

        @media (max-width: 768px) {
            .wrap { gap: 16px; }
            .glass-box { padding: 28px 24px; border-radius: 20px; }
        }

        .box-top {
            animation-delay: 0.4s;
            border-top: 1px solid rgba(255, 65, 108, 0.35);
        }

        .box-bottom {
            animation-delay: 3.4s; 
            border-bottom: 1px solid rgba(0, 114, 255, 0.35);
        }

        /* ── PERFECT VISIBILITY PREMIUM TYPOGRAPHY ── */
        .tag-text {
            font-size: clamp(13px, 3.2vw, 16px);
            font-weight: 900;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .main-text {
            font-size: clamp(20px, 5.2vw, 27px);
            font-weight: 600;
            line-height: 1.4;
            letter-spacing: -0.02em;
            color: rgba(255, 255, 255, 0.98);
        }

        .sub-text {
            font-size: clamp(14px, 3.6vw, 15.5px);
            font-weight: 300;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.78);
            margin-top: 16px;
        }

        /* ── EXACT REPLICATED BRAND GRADIENT (From testing-1.html) ── */
        .brand-gradient {
            background: linear-gradient(90deg, #ff416c, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* Multi-pass drop-shadow ensures gradient text jumps off the glass box */
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.9)) drop-shadow(0px 4px 12px rgba(0, 114, 255, 0.15));
        }

        /* ── REVEAL ENGINE ── */
        .char {
            display: inline-block;
            opacity: 0;
            filter: blur(12px);
            transform: translate3d(0, 10px, 0);
            animation: blurReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Safe container animation layout for clips to avoid modern browser clipping glitches */
        .word-reveal {
            display: inline-block;
            opacity: 0;
            filter: blur(12px);
            transform: translate3d(0, 10px, 0);
            animation: blurReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--delay);
        }

        @keyframes blurReveal {
            0% { opacity: 0; filter: blur(12px); transform: translate3d(0, 10px, 0); }
            100% { opacity: 1; filter: blur(0px); transform: translate3d(0, 0, 0); }
        }
        
    </style>
</head>

<body>

    <div class="orb-wrapper">
        <div class="orb orb-pink"></div>
        <div class="orb orb-blue"></div>
    </div>

    <div class="wrap">

        <div class="glass-box box-top">
            <div class="tag-text brand-gradient word-reveal" style="--delay: 1.1s;">more people asked</div>
            <div class="main-text blur-text" data-start="1.6">Where is the OTP in the email?</div>
        </div>

        <div class="glass-box box-bottom">
            <div class="main-text">
                <span class="blur-text" data-start="4.0">The OTP will be in the </span>
                <strong class="brand-gradient word-reveal" style="--delay: 4.5s;">spam section</strong>
                <span class="blur-text" data-start="4.7"> of the Gmail</span>
            </div>
            <div class="sub-text">
                <strong class="brand-gradient word-reveal" style="font-weight: 900; --delay: 5.2s;">Reason: </strong>
                <span class="blur-text" data-start="5.4">We are currently using a Gmail that does not belong to our website, and are currently working on a separate Gmail for it to appear normally in Gmail's inbox, which will be provided soon.</span>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const blurTexts = document.querySelectorAll('.blur-text');
            
            blurTexts.forEach(el => {
                const text = el.innerText;
                const baseDelay = parseFloat(el.getAttribute('data-start')) || 0;
                
                el.innerHTML = '';
                
                let charCount = 0;
                const words = text.split(' ');
                
                words.forEach((word, index) => {
                    const wordSpan = document.createElement('span');
                    wordSpan.style.display = 'inline-block';
                    
                    word.split('').forEach(char => {
                        const charSpan = document.createElement('span');
                        charSpan.textContent = char;
                        charSpan.className = 'char';
                        charSpan.style.animationDelay = `${baseDelay + (charCount * 0.02)}s`;
                        wordSpan.appendChild(charSpan);
                        charCount++;
                    });
                    
                    el.appendChild(wordSpan);
                    
                    if (index < words.length - 1) {
                        el.appendChild(document.createTextNode('\u00A0'));
                    }
                });
            });
        });
    </script>
</body>

</html>
