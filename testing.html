<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EpicScholar - Join Us</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;900&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Sora', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* ── MOBILE CONTAINER ── */
        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* ── BACKGROUND ORBS ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0;
            animation: orbIn 3s ease 0.5s forwards;
            z-index: 1;
        }

        @keyframes orbIn {
            to { opacity: 1; }
        }

        /* ── LOGO SVG ── */
        .logo {
            opacity: 0;
            transform: scale(0.85);
            animation: logoIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            margin-bottom: 40px;
        }

        @keyframes logoIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── CINEMATIC TYPOGRAPHY REVEALS ── */
        .title {
            font-size: clamp(28px, 8vw, 36px);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.15;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: elementUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .gradient-text {
            background: linear-gradient(90deg, #ff416c, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 16px;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 48px;
            max-width: 320px;
            opacity: 0;
            transform: translateY(25px);
            animation: elementUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
        }

        /* ── CTA BUTTON WITH GRADIENT & BORDER GLOW ── */
        .cta-button {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 300px;
            padding: 18px 32px;
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(90deg, #ff416c, #0072ff);
            border-radius: 30px;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: elementUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
            box-shadow: 0 10px 30px rgba(0, 114, 255, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }

        .cta-button:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.2);
        }

        /* Subtitle Free Badge Style */
        .sub-badge {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ff416c;
            margin-top: 16px;
            opacity: 0;
            animation: fadeIn 1s ease 1.8s forwards;
        }

        @keyframes elementUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="orb"
        style="width:80vw;height:80vw;background:radial-gradient(circle,rgba(255,65,108,.16) 0%,transparent 70%);top:-10%;right:-10%;">
    </div>
    <div class="orb"
        style="width:80vw;height:80vw;background:radial-gradient(circle,rgba(0,114,255,.14) 0%,transparent 70%);bottom:-10%;left:-10%;">
    </div>

    <div class="phone-wrapper">

        <svg class="logo" width="82" viewBox="0 0 110 88" fill="none">
            <defs>
                <linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"110\" y2=\"88\" gradientUnits=\"userSpaceOnUse\">
                    <stop offset=\"0%\" stop-color=\"#ff416c\" />
                    <stop offset=\"100%\" stop-color=\"#0072ff\" />
                </linearGradient>
            </defs>
            <polygon points="55,7 104,29 55,51 6,29" fill="url(#g)" />
            <line x1="104" y1="29" x2="104" y2="56" stroke="url(#g)" stroke-width="3" stroke-linecap="round" />
            <path d="M23,45 C23,65 37,79 55,79 C73,79 87,65 87,45" stroke="url(#g)" stroke-width="6" stroke-linecap="round" fill="none" />
        </svg>

        <h1 class="title">To enjoy this <br><span class="gradient-text">amazing experience</span></h1>

        <p class="description">Join our premium educational platform today and redefine your learning journey.</p>

        <a href="https://epicscholar.cloud" class="cta-button">
            epicscholar.cloud
        </a>

        <span class="sub-badge">Join for Free</span>

    </div>

</body>

</html>
