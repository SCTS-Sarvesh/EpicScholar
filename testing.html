<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Trailer - Clarify Doubts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;900&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #050508;
            /* Slightly deeper cinematic black */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Sora', sans-serif;
        }

        /* ── AMBIENT ORBS ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0;
            mix-blend-mode: screen;
            animation: orbIn 4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes orbIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            100% {
                opacity: 0.6;
                transform: scale(1);
            }
        }

        /* ── LAYOUT CONTAINER ── */
        .text-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            max-width: 900px;
            z-index: 10;
        }

        /* ── MAIN HEADING ── */
        .clarify-doubts {
            display: block;
            /* Scaled down slightly to accommodate a full sentence */
            font-size: clamp(36px, 6.5vw, 84px);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            text-wrap: balance;
            /* Ensures beautiful multi-line wrapping */

            /* High-quality text gradient */
            background: linear-gradient(135deg, #ff416c, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            /* 3D Cinematic Reveal Initial State */
            opacity: 0;
            transform: perspective(1000px) rotateX(-20deg) translateY(40px) scale(0.95);
            filter: blur(12px);
            animation: cinematicReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff416c, #0072ff, transparent);
            border-radius: 2px;
            margin-top: clamp(24px, 3vw, 32px);
            opacity: 0;
            animation: lineGrow 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }

        /* ── TAGLINE ── */
        .tagline {
            /* Increased size and reduced tracking for sentence legibility */
            font-size: clamp(14px, 1.8vw, 20px);
            font-weight: 300;
            letter-spacing: 0.04em;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin-top: clamp(20px, 2.5vw, 28px);
            text-wrap: balance;

            /* 3D Cinematic Reveal Initial State */
            opacity: 0;
            transform: translateY(20px);
            filter: blur(8px);
            animation: subtitleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
        }

        /* ── ANIMATION KEYFRAMES ── */
        @keyframes cinematicReveal {
            to {
                opacity: 1;
                transform: perspective(1000px) rotateX(0) translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes subtitleReveal {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes lineGrow {
            0% {
                width: 0;
                opacity: 0;
            }

            100% {
                width: clamp(150px, 30vw, 400px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="orb"
        style="width:50vw;height:50vw;background:radial-gradient(circle,rgba(255,65,108,.15) 0%,transparent 70%);top:-10%;right:-8%;">
    </div>
    <div class="orb"
        style="width:44vw;height:44vw;background:radial-gradient(circle,rgba(0,114,255,.15) 0%,transparent 70%);bottom:-10%;left:-8%;animation-delay:0.8s;">
    </div>

    <div class="text-wrap">
        <h1 class="clarify-doubts">A Small break</h1>
        <div class="divider"></div>
        <p class="tagline">The most satisfying study break on the internet. 🤫</p>
    </div>

</body>

</html>
