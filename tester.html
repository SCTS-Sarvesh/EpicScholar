<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EpicScholar - grade-9</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;900&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Sora', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* ── MOBILE CONTAINER ── */
        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* ── BACKGROUND ORBS ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0;
            animation: orbIn 3s ease 0.5s forwards;
            z-index: 1;
        }

        @keyframes orbIn {
            to {
                opacity: 1;
            }
        }

        /* ── CHAT HEADER ── */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-icon {
            color: rgba(255, 255, 255, 0.6);
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .chat-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, #ff416c, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-subtitle {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .chat-subtitle.typing {
            color: #ff416c;
            font-weight: 600;
            animation: pulseTyping 1.5s infinite ease-in-out;
        }

        @keyframes pulseTyping {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* ── CHAT MESSAGES AREA ── */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
        }

        .chat-body::-webkit-scrollbar {
            display: none;
        }

        /* ── CINEMATIC TEXT BOX CONTAINER BASE ── */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            opacity: 0;
            transform: translateY(24px) scale(0.96);
        }

        .sender-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            font-weight: 300;
            overflow: hidden;
        }

        .type-reveal {
            display: inline-block;
            white-space: pre-wrap;
            opacity: 0;
        }

        .timestamp {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 6px;
            align-self: flex-end;
            font-weight: 300;
            opacity: 0;
        }

        @keyframes boxReveal {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes textReveal {
            to {
                opacity: 1;
            }
        }

        /* ── WHATSAPP TYPING INDICATOR BUBBLE ── */
        .typing-indicator-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 22px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: boxReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards,
                fadeOutIndicator 0.4s ease 5.3s forwards;
        }

        .typing-indicator-bubble span {
            width: 7px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-indicator-bubble span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator-bubble span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
                background-color: #ff416c;
            }
        }

        @keyframes fadeOutIndicator {
            to {
                opacity: 0;
                transform: translateY(-10px);
                margin-bottom: -55px;
                visibility: hidden;
            }
        }

        /* ── TEACHER MESSAGE ARTIFACTS ── */
        .message.teacher {
            align-self: flex-start;
            animation: boxReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 5.4s forwards;
        }

        .message.teacher .sender-name {
            color: #ff416c;
        }

        .message.teacher .bubble {
            background: linear-gradient(135deg, rgba(255, 65, 108, 0.12), rgba(0, 114, 255, 0.05));
            border: 1px solid rgba(255, 65, 108, 0.25);
            border-top-left-radius: 4px;
        }

        .message.teacher .type-reveal {
            animation: textReveal 0.8s ease 5.9s forwards;
        }

        .message.teacher .timestamp {
            animation: textReveal 0.6s ease 6.5s forwards;
        }

        /* ── STAGGERED REACTION BADGES ── */
        .reactions-container {
            display: flex;
            gap: 8px;
            margin-top: -8px;
            margin-left: 12px;
            z-index: 2;
        }

        .reaction-badge {
            background: #121214;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 2px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: scale(0.6);
        }

        @keyframes badgeReveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reaction-likes {
            animation: badgeReveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) 7.2s forwards;
        }

        .reaction-hearts {
            animation: badgeReveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) 8.8s forwards;
        }

        /* ── CASINO SLOT / YOUTUBE VIEW ROLLER MECHANICAL ENGINE ── */
        .slot-ticker {
            display: inline-flex;
            height: 16px;
            /* Matches line-height precisely */
            overflow: hidden;
            position: relative;
        }

        .slot-strip {
            display: flex;
            flex-direction: column;
            transform: translateY(0);
            transition: none;
        }

        .slot-strip span {
            height: 16px;
            line-height: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            display: block;
        }

        /* Keyframes for sliding digits upwards like mechanical wheels */
        @keyframes rollTo-1 {
            to {
                transform: translateY(calc(-16px * 1));
            }
        }

        @keyframes rollTo-2 {
            to {
                transform: translateY(calc(-16px * 2));
            }
        }

        @keyframes rollTo-4 {
            to {
                transform: translateY(calc(-16px * 4));
            }
        }

        /* Triggering rolls at perfect intervals following their parent badge reveals */
        .reaction-likes .slot-strip.digit-1 {
            animation: rollTo-1 1.2s cubic-bezier(0.16, 1, 0.3, 1) 7.6s forwards;
        }

        .reaction-likes .slot-strip.digit-2 {
            animation: rollTo-2 1.5s cubic-bezier(0.16, 1, 0.3, 1) 7.7s forwards;
        }

        .reaction-hearts .slot-strip.digit-4 {
            animation: rollTo-4 1.4s cubic-bezier(0.16, 1, 0.3, 1) 9.2s forwards;
        }

        /* ── STUDENT MESSAGE REVEALS ── */
        .message.student {
            align-self: flex-end;
        }

        .message.student .sender-name {
            color: #0072ff;
            align-self: flex-end;
        }

        .message.student .bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top-right-radius: 4px;
        }

        .msg-delay-1 {
            animation: boxReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 10.6s forwards;
        }

        .msg-delay-1 .type-reveal {
            animation: textReveal 0.6s ease 11.1s forwards;
        }

        .msg-delay-1 .timestamp {
            animation: textReveal 0.4s ease 11.5s forwards;
        }

        .msg-delay-2 {
            animation: boxReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 12.2s forwards;
        }

        .msg-delay-2 .type-reveal {
            animation: textReveal 0.6s ease 12.7s forwards;
        }

        .msg-delay-2 .timestamp {
            animation: textReveal 0.4s ease 13.1s forwards;
        }

        .msg-delay-3 {
            animation: boxReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 13.8s forwards;
        }

        .msg-delay-3 .type-reveal {
            animation: textReveal 0.6s ease 14.3s forwards;
        }

        .msg-delay-3 .timestamp {
            animation: textReveal 0.4s ease 14.7s forwards;
        }

        /* ── FOOTER BAR ── */
        .chat-footer {
            padding: 20px 24px 30px 24px;
            background: rgba(0, 0, 0, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            animation: textReveal 1.2s ease 1s forwards;
        }

        .input-mock {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px;
            border-radius: 24px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 300;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .send-icon {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.2);
        }

        @keyframes changeHeaderState {

            0%,
            90% {
                content: "history mam typing...";
                color: #ff416c;
                letter-spacing: 0.02em;
                font-weight: 600;
            }

            100% {
                content: "EpicScholar Network";
                color: rgba(255, 255, 255, 0.4);
                font-weight: 300;
            }
        }

        .chat-subtitle::after {
            content: "EpicScholar Network";
            animation: changeHeaderState 5.4s step-end forwards;
        }
    </style>
</head>

<body>

    <div class="orb"
        style="width:80vw;height:80vw;background:radial-gradient(circle,rgba(255,65,108,.15) 0%,transparent 70%);top:-20%;right:-20%;">
    </div>
    <div class="orb"
        style="width:80vw;height:80vw;background:radial-gradient(circle,rgba(0,114,255,.12) 0%,transparent 70%);bottom:-20%;left:-20%;">
    </div>

    <div class="phone-wrapper">

        <header class="chat-header">
            <div class="back-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <div class="header-info">
                <span class="chat-title">grade-9</span>
                <span class="chat-subtitle typing"></span>
            </div>
        </header>

        <div class="chat-body">

            <div class="typing-indicator-bubble">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="message teacher">
                <span class="sender-name">history mam</span>
                <div class="bubble">
                    <div class="type-reveal">prepare for a test tomorrow on Nazism only MCQ</div>
                </div>
                <span class="timestamp">10:00 p.m.</span>
            </div>

            <div class="reactions-container">

                <div class="reaction-badge reaction-likes">
                    <span style="margin-right: 2px;">👍</span>

                    <div class="slot-ticker">
                        <div class="slot-strip digit-1">
                            <span>0</span>
                            <span>1</span>
                        </div>
                    </div>

                    <div class="slot-ticker">
                        <div class="slot-strip digit-2">
                            <span>0</span>
                            <span>1</span>
                            <span>2</span>
                        </div>
                    </div>
                </div>

                <div class="reaction-badge reaction-hearts">
                    <span style="margin-right: 2px;">❤️</span>

                    <div class="slot-ticker">
                        <div class="slot-strip digit-4">
                            <span>0</span>
                            <span>1</span>
                            <span>2</span>
                            <span>3</span>
                            <span>4</span>
                        </div>
                    </div>
                </div>

            </div>

            <div class="message student msg-delay-1">
                <span class="sender-name">Aryan Sharma</span>
                <div class="bubble">
                    <div class="type-reveal">okay mam</div>
                </div>
                <span class="timestamp">10:01 p.m.</span>
            </div>

            <div class="message student msg-delay-2">
                <span class="sender-name">Ananya Iyer</span>
                <div class="bubble">
                    <div class="type-reveal">okay mam</div>
                </div>
                <span class="timestamp">10:01 p.m.</span>
            </div>

            <div class="message student msg-delay-3">
                <span class="sender-name">Kabir Malhotra</span>
                <div class="bubble">
                    <div class="type-reveal">okay mam</div>
                </div>
                <span class="timestamp">10:02 p.m.</span>
            </div>

        </div>

        <footer class="chat-footer">
            <div class="input-mock">
                <span>Message grade-9...</span>
                <svg class="send-icon" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </div>
        </footer>

    </div>

</body>

</html>
