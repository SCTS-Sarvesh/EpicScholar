<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Spider Library - Cinematic Gateway</title>
    <style>
        :root {
            /* Advanced Spatial Easing */
            --spring-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.25);
            --spring-snap: cubic-bezier(0.24, 1.35, 0.4, 1.05);

            /* High-Fidelity Palette */
            --glass-bg: rgba(15, 15, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --apple-red: #ff3b30;
            --apple-blue: #0a84ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* =========================================
           BACKGROUND: SINGLE COLUMN HD STREAM
           ========================================= */
        .bg-stream-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
            opacity: 0.85;
            /* Highly visible */
        }

        .scroll-track {
            display: flex;
            flex-direction: column;
            width: 120vw;
            /* Bleeds slightly off-screen for a cinematic crop */
            max-width: 600px;
            gap: 20px;
            padding-top: 20px;
            animation: streamUp 45s linear infinite;
        }

        /* High-Quality Book Thumbnails */
        .book-thumb {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            flex-shrink: 0;
        }

        @keyframes streamUp {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-50%);
            }

            /* Scrolls exactly half the track to loop */
        }

        /* =========================================
           VIGNETTE: FIXED FULL-SCREEN COVERAGE
           ========================================= */
        .bg-vignette {
            position: fixed;
            /* Guarantees it covers the entire viewport */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            /* Deep radial gradient to darken edges and make text pop */
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.3) 10%, rgba(0, 0, 0, 0.95) 85%);
            z-index: 2;
            pointer-events: none;
        }

        /* =========================================
           FOREGROUND: INDIVIDUAL LIQUID GLASS UI
           ========================================= */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding: 0 20px;
        }

        /* Shared Glass Properties */
        .glass-element {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(220%);
            -webkit-backdrop-filter: blur(30px) saturate(220%);
            border: 0.5px solid var(--glass-border);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 20px 40px rgba(0, 0, 0, 0.7);

            /* Hidden State */
            opacity: 0;
            filter: blur(20px);
            transform: translateY(50px) scale(0.85);

            /* Entrance */
            animation: cinematicPop 1.2s var(--spring-snap) forwards;
        }

        @keyframes cinematicPop {
            0% {
                opacity: 0;
                filter: blur(20px);
                transform: translateY(50px) scale(0.85);
            }

            100% {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0) scale(1);
            }
        }

        /* 1. Logo Pill */
        .logo-pill {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-image: url('logo-library.png');
            background-size: 80%;
            background-repeat: no-repeat;
            background-position: center;
            border-color: rgba(255, 59, 48, 0.5);
            animation-delay: 3.0s;
        }

        /* 2. Title Pill */
        .title-pill {
            padding: 15px 35px;
            border-radius: 24px;
            text-align: center;
            border-color: rgba(10, 132, 255, 0.4);
            animation-delay: 3.15s;
            position: relative;
            overflow: hidden;
        }

        .title-pill h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .text-red {
            color: var(--apple-red);
            text-shadow: 0 0 25px rgba(255, 59, 48, 0.5);
        }

        .text-blue {
            color: var(--apple-blue);
            text-shadow: 0 0 25px rgba(10, 132, 255, 0.5);
        }

        /* 3. Pricing Pill */
        .price-pill {
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            animation-delay: 3.3s;
        }

        .price-pill span {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.15rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }

        /* 4. Action Button */
        .action-btn {
            margin-top: 10px;
            padding: 18px 45px;
            border-radius: 35px;
            font-size: 1.15rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            border: 0.5px solid rgba(255, 255, 255, 0.4);

            /* Gradient overlay blending Red and Blue into the glass */
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.6) 0%, rgba(255, 59, 48, 0.4) 100%), var(--glass-bg);
            box-shadow:
                inset 0 1px 3px rgba(255, 255, 255, 0.5),
                0 15px 35px rgba(10, 132, 255, 0.4);

            animation-delay: 3.45s;
            transition: transform 0.3s var(--spring-bounce);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        /* Glossy Specular Sweep */
        .title-pill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: sweep 6s infinite 4.5s;
            pointer-events: none;
        }

        @keyframes sweep {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }
    </style>
</head>
