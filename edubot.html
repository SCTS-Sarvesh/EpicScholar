<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EpicScholar EduBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="edubot.css">
</head>

<body>
    <div id="liquid-glass-container">
        <div class="glass-blob blob-1"></div>
        <div class="glass-blob blob-2"></div>
        <div class="glass-blob blob-3"></div>
    </div>

    <div class="sidebar-wrapper">

        <div class="nav-sidebar glass-element" id="navSidebar">
            <div class="nav-wrap" id="navWrap">
                <a class="nav-item" href="dashboard.html" data-icon="🏠">
                    <span class="nav-icon-generic">🏠 </span>
                    <span class="nav-text"> Home</span>
                </a>
                <a class="nav-item" href="messages.html" data-icon="✉️">
                    <span class="nav-icon-generic">✉️ </span>
                    <span class="nav-text"> Messages</span>
                </a>
                <a class="nav-item" href="self-study.html" data-icon="📖">
                    <span class="nav-icon-generic">📖 </span>
                    <span class="nav-text"> Self-Study</span>
                </a>
                <a class="nav-item nav-item-active" href="edubot.html" data-icon="🤖">
                    <span class="nav-icon-generic">🤖 </span>
                    <span class="nav-text"> EduBot</span>
                </a>
                <a class="nav-item" href="mini-games.html" data-icon="🎮">
                    <span class="nav-icon-generic">🎮 </span>
                    <span class="nav-text"> Mini-Games</span>
                </a>
            </div>

            <div class="settings-wrap">
                <a class="nav-item" href="profile.html" data-icon="👤">
                    <span class="nav-icon-generic">👤</span>
                    <span class="nav-text">Profile</span>
                </a>
            </div>
        </div>

        <div class="history-sidebar glass-element" id="sidebar">
            <button class="hambtn" id="hambtn" title="Toggle history"><i class="fa-solid fa-bars"></i></button>

            <header>
                <span class="title">Chat History</span>
            </header>

            <button class="new-chat-btn" id="newChatBtn"><i class="fa-solid fa-plus"></i> New Chat</button>
            <div class="hist" id="history"></div>

        </div>
    </div>

    <div class="main">
        <div class="header-main" id="headerTitle">
            <button class="mobile-ham-btn" id="mobileHamBtn" title="Chat History">
                <i class="fa-solid fa-bars"></i>
            </button>
            <span id="headerTitleText">EduBot</span>
        </div>
        <div class="container">
            <div id="chat"></div>
            <div class="attach-row" id="attachRow" aria-hidden="true"></div>
        </div>

        <div class="input-row" id="inputRow">
            <button class="icon-btn" id="voiceBtn" title="Voice"><i class="fa-solid fa-microphone"></i></button>
            <button class="icon-btn" id="fileBtn" title="Attach"><i class="fa-solid fa-paperclip"></i></button>
            <input type="file" id="fileInput" multiple style="display:none" aria-hidden="true" tabindex="-1" />
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button class="icon-btn" id="sendBtn" title="Send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ═══ MOBILE BOTTOM BAR ═══ -->
    <div class="mobile-bottom-bar" id="mobileBottomBar">
        <a href="dashboard.html" class="mobile-nav-icon"><i class="fas fa-home"></i></a>
        <a href="messages.html" class="mobile-nav-icon"><i class="fas fa-envelope"></i></a>
        <a href="self-study.html" class="mobile-nav-icon"><i class="fas fa-book-open"></i></a>
        <a href="edubot.html" class="mobile-nav-icon active"><i class="fas fa-robot"></i></a>
        <a href="mini-games.html" class="mobile-nav-icon"><i class="fas fa-gamepad"></i></a>
        <a href="profile.html" class="mobile-nav-icon"><i class="fas fa-user"></i></a>
    </div>

    <!-- ═══ MOBILE HISTORY DRAWER (hamburger-triggered) ═══ -->
    <div class="mobile-history-overlay" id="mobileHistoryOverlay">
        <div class="mobile-history-drawer" id="mobileHistoryDrawer">
            <div class="mobile-history-header">
                <span>Chat History</span>
                <button class="close-history-btn" id="closeHistoryBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <button class="new-chat-btn" id="mobileNewChatBtn"><i class="fa-solid fa-plus"></i> New Chat</button>
            <div class="hist" id="mobileHistory"></div>
        </div>
    </div>

    <button class="scroll-bottom" id="scrollBtn" title="Scroll to bottom"><i
            class="fa-solid fa-arrow-down"></i></button>
    <div id="toast-container"></div>
    <script src="edubot.js"></script>
</body>

</html>
