<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Spider Library - Cinematic Scroll</title>
    <style>
        :root {
            /* Advanced Spatial Easing */
            --spring-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.25);
            --spring-snap: cubic-bezier(0.24, 1.35, 0.4, 1.05);

            /* High-Fidelity Palette */
            --glass-bg: rgba(15, 15, 20, 0.55);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           BACKGROUND: MULTI-DIRECTIONAL BANDS
           ========================================= */
        .viewport-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3vh;
            padding: 5vh 0;
            z-index: 1;
            transform: perspective(1000px) rotateX(2deg);
        }

        .scroll-row {
            display: flex;
            width: 200%;
            gap: 20px;
        }

        .row-left {
            animation: scrollLeft 35s linear infinite;
        }

        .row-right {
            animation: scrollRight 40s linear infinite;
            transform: translate3d(-50%, 0, 0);
        }

        @keyframes scrollLeft {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        @keyframes scrollRight {
            0% {
                transform: translate3d(-50%, 0, 0);
            }

            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        /* High-Quality Book Links/Thumbnails */
        .book-link {
            display: block;
            width: 14vw;
            min-width: 120px;
            max-width: 200px;
            aspect-ratio: 2/3;
            border-radius: 12px;
            flex-shrink: 0;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .book-link:hover {
            transform: scale(1.05) translateY(-10px);
            z-index: 10;
        }

        .book-thumb {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background-color: #1a1a1a;
            /* Fallback color while loading */
        }

        /* Background Vignette */
        .bg-vignette {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.95) 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* =========================================
           FOREGROUND OVERLAY (TRIGGERED BY SPACEBAR)
           ========================================= */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s var(--spring-snap);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .glass-element {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(220%);
            -webkit-backdrop-filter: blur(40px) saturate(220%);
            border: 0.5px solid var(--glass-border);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 30px 60px rgba(0, 0, 0, 0.9);

            padding: 24px 45px;
            border-radius: 28px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.95);
            text-align: center;

            transform: translateY(60px) scale(0.85);
            filter: blur(20px);
            opacity: 0;
            transition: all 0.8s var(--spring-snap);
        }

        .overlay.active .glass-element {
            transform: translateY(0) scale(1);
            filter: blur(0px);
            opacity: 1;
        }

        .glass-element span {
            background: linear-gradient(135deg, #0a84ff, #ff3b30);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

    <script>
        // Listen for Spacebar press
        document.addEventListener('keydown', function (event) {
            if (event.code === 'Space' || event.key === ' ') {
                event.preventDefault(); // Prevents page scroll

                const overlay = document.getElementById('actionOverlay');
                if (overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                } else {
                    overlay.classList.add('active');
                }
            }
        });

        // Close overlay if clicked
        document.getElementById('actionOverlay').addEventListener('click', function () {
            this.classList.remove('active');
        });
    </script>
